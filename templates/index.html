<!doctype html>
<html lang="en">
<head>
    <title>Document Processing System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>📄 Document Processing</h2>
    <p>Upload your invoice/image</p>

    <form method="post" enctype="multipart/form-data" id="uploadForm">
       <div class="drop-area" id="drop-area">
        <p id="drop-text">Drag & Drop file here or click to upload</p>
        <input type="file" name="file" id="fileInput" required hidden>
        </div>
        <div id="file-info" class="file-info hidden">
        <span id="file-name"></span>
        <button type="button" id="remove-btn">❌</button>
        </div>

        <button type="submit">Process Document</button>
    </form>

    <div id="loader" class="loader hidden"></div>

    {% if result %}
    <div class="result">
        <h3>Output</h3>
        <pre>{{ result }}</pre>

        {% if '"VALID"' in result %}
            <span class="badge valid">VALID ✅</span>
        {% else %}
            <span class="badge invalid">INVALID ❌</span>
        {% endif %}
    </div>
    {% endif %}
</div>

<script>
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('fileInput');
const fileNameDisplay = document.getElementById('file-name');
const fileInfo = document.getElementById('file-info');
const removeBtn = document.getElementById('remove-btn');
const dropText = document.getElementById('drop-text');
const form = document.getElementById('uploadForm');
const loader = document.getElementById('loader');

// Click to open file picker
dropArea.addEventListener('click', () => fileInput.click());

// When file selected
fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
        fileNameDisplay.textContent = fileInput.files[0].name;
        fileInfo.classList.remove('hidden');
        dropText.textContent = "File ready to upload";
    }
});

// Drag over
dropArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropArea.classList.add('hover');
    dropText.textContent = "Drop file here";
});

// Drag leave
dropArea.addEventListener('dragleave', () => {
    dropArea.classList.remove('hover');
    dropText.textContent = "Drag & Drop file here or click to upload";
});

// Drop file
dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
    dropArea.classList.remove('hover');

    if (fileInput.files.length > 0) {
        fileNameDisplay.textContent = fileInput.files[0].name;
        fileInfo.classList.remove('hidden');
        dropText.textContent = "File ready to upload";
    }
});

// Remove file
removeBtn.addEventListener('click', () => {
    fileInput.value = "";
    fileInfo.classList.add('hidden');
    fileNameDisplay.textContent = "";
    dropText.textContent = "Drag & Drop file here or click to upload";
});

// Loader
form.addEventListener('submit', () => {
    loader.classList.remove('hidden');
});
</script>

</body>
</html>
